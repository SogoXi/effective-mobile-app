version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
